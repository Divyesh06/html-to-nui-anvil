<style>
    .task-row {
        display: flex;
        align-items: center;
        gap: 12px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 12px 16px;
    }
    .task-row:hover {
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* ── Checkbox: base + checked modifier ── */
    .task-checkbox {
        width: 20px;
        height: 20px;
        border: 2px solid #d1d5db;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 12px;
        color: white;
        background: white;
    }
    .checked {
        border-color: #3b82f6;
        background: #3b82f6;
    }

    /* ── Title: base + done modifier ── */
    .task-title {
        flex: 1;
        font-size: 14px;
        color: #1f2937;
    }
    .done {
        color: #9ca3af;
        text-decoration: line-through;
    }

    /* ── Delete button ── */
    .delete-btn {
        padding: 4px 10px;
        border: none;
        border-radius: 6px;
        background: transparent;
        font-size: 18px;
        cursor: pointer;
        color: #d1d5db;
        line-height: 1;
    }
    .delete-btn:hover {
        color: #dc2626;
        background: #fef2f2;
    }
</style>

<div anvil-var="task_row" class="task-row">
    <div anvil-var="checkbox" class="task-checkbox" anvil-event-click="toggle_click"></div>
    <span anvil-var="title_label" class="task-title"></span>
    <button anvil-var="delete_btn" class="delete-btn" anvil-event-click="delete_click">&times;</button>
</div>
